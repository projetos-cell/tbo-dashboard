# ============================================================================
# TBO OS — CI/CD Pipeline
# TypeScript Check, Build, Security Guardrails, SQL Validation, Deploy Gate
# ============================================================================

name: TBO OS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── 1. Lint & Code Quality ─────────────────────────────────────────────
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Check for hardcoded credentials
        run: |
          echo "=== Verificando credenciais hardcoded ==="
          FOUND=0
          for pattern in "service_role" "SUPABASE_SERVICE_ROLE" "sk-[a-zA-Z0-9]{20,}"; do
            if grep -rn --include="*.ts" --include="*.tsx" "$pattern" app/ features/ lib/ hooks/ services/ components/ 2>/dev/null | grep -v node_modules | grep -v ".example"; then
              echo "ALERTA: Possivel credencial hardcoded encontrada!"
              FOUND=1
            fi
          done
          if [ $FOUND -eq 1 ]; then
            echo "::error::Credenciais hardcoded detectadas!"
            exit 1
          fi
          echo "Nenhuma credencial hardcoded encontrada."

  # ── 2. Security Scan ──────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check dangerouslySetInnerHTML usage
        run: |
          echo "=== Verificando dangerouslySetInnerHTML ==="
          RISKY=$(grep -rn "dangerouslySetInnerHTML" frontend/ --include="*.tsx" --include="*.ts" | grep -v node_modules | wc -l)
          echo "dangerouslySetInnerHTML encontrados: $RISKY"
          if [ "$RISKY" -gt 5 ]; then
            echo "::warning::$RISKY usos de dangerouslySetInnerHTML. Verifique sanitizacao."
            grep -rn "dangerouslySetInnerHTML" frontend/ --include="*.tsx" --include="*.ts" | grep -v node_modules | head -10
          fi

      - name: Check for env leaks in client code
        run: |
          echo "=== Verificando vazamento de env vars ==="
          LEAKS=$(grep -rn "process\.env\." frontend/app/ frontend/features/ frontend/components/ --include="*.tsx" --include="*.ts" | \
            grep -v "NEXT_PUBLIC_" | grep -v node_modules | grep -v ".server." | wc -l)
          echo "Server env vars em client code: $LEAKS"
          if [ "$LEAKS" -gt 0 ]; then
            echo "::warning::$LEAKS possiveis vazamentos de env vars do servidor"
            grep -rn "process\.env\." frontend/app/ frontend/features/ frontend/components/ --include="*.tsx" --include="*.ts" | \
              grep -v "NEXT_PUBLIC_" | grep -v node_modules | grep -v ".server." | head -10
          fi

  # ── 3. Build Validation ───────────────────────────────────────────────
  build:
    name: Build Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Next.js build
        run: npx next build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder

      - name: Validate JSON configs
        working-directory: .
        run: |
          if [ -f "vercel.json" ]; then
            python3 -c "import json; json.load(open('vercel.json'))" && echo "vercel.json: OK"
          fi

  # ── 4. Security Guardrails ────────────────────────────────────────────
  guardrails:
    name: Security Guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check no service_role in frontend
        run: node scripts/ci-check-no-service-role.js

      - name: Check single Supabase client
        run: node scripts/ci-check-single-supabase-client.js

      - name: Validate structure
        run: node scripts/validate-build.js

  # ── 5. Migration Validation ───────────────────────────────────────────
  migrations:
    name: SQL Migration Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate SQL syntax
        run: |
          echo "=== Validando migrations SQL ==="
          for dir in database supabase/migrations; do
            for sql in $dir/*.sql; do
              if [ -f "$sql" ]; then
                OPEN=$(grep -o '(' "$sql" | wc -l)
                CLOSE=$(grep -o ')' "$sql" | wc -l)
                if [ "$OPEN" -ne "$CLOSE" ]; then
                  echo "::warning::$sql tem parenteses desbalanceados (open=$OPEN, close=$CLOSE)"
                else
                  echo "$sql: parenteses OK"
                fi
                TABLES=$(grep -c "CREATE TABLE" "$sql" || true)
                RLS=$(grep -c "ENABLE ROW LEVEL SECURITY\|ALTER TABLE.*ENABLE ROW" "$sql" || true)
                if [ "$TABLES" -gt 0 ]; then
                  echo "$sql: $TABLES tabelas, $RLS com RLS"
                  if [ "$RLS" -lt "$TABLES" ]; then
                    echo "::warning::$sql tem $TABLES tabelas mas apenas $RLS com RLS habilitado"
                  fi
                fi
              fi
            done
          done

  # ── 6. Deploy Gate ────────────────────────────────────────────────────
  deploy-gate:
    name: Deploy Gate
    needs: [lint, security, build, guardrails, migrations]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: All checks passed
        run: |
          echo "============================================"
          echo "  TBO OS — Todas as verificacoes passaram"
          echo "  Deploy para Vercel autorizado"
          echo "============================================"
